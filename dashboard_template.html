<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal — Daily A&R Detection</title>
<style>
  :root {
    --ink: #14161a;
    --panel: #1b1e24;
    --panel-raised: #21252c;
    --hairline: #2b2f38;
    --paper: #ece8e0;
    --muted: #888c98;
    --muted-dim: #5c606c;
    --signal: #d9a441;
    --signal-dim: #6b5a35;
    --tiktok: #4fa79d;
    --spotify: #7a9b76;
    --shazam: #5b8dc9;
    --soundcloud: #d98a4f;
    --instagram: #b97d7d;
    --playlist: #7c88a6;
    --flag: #c1554d;
    --font-display: 'IBM Plex Sans Condensed', 'Arial Narrow', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-body);
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ---------- Header ---------- */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 18px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.04em;
    margin: 0;
    color: var(--paper);
  }

  .brand .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 8px 2px rgba(217,164,65,0.55);
    display: inline-block;
    position: relative;
    top: -12px;
  }

  .brand .sub {
    font-size: 12.5px;
    color: var(--muted);
    letter-spacing: 0.01em;
  }

  .meta {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--muted);
  }

  .meta .count {
    color: var(--paper);
    font-size: 15px;
  }

  .meta .count b { color: var(--signal); font-weight: 600; }

  /* ---------- Filters ---------- */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 11.5px;
    padding: 6px 11px;
    border: 1px solid var(--hairline);
    border-radius: 3px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: border-color .15s, color .15s;
    background: transparent;
  }
  .chip:hover { border-color: var(--muted); color: var(--paper); }
  .chip.active {
    border-color: var(--signal);
    color: var(--signal);
    background: rgba(217,164,65,0.08);
  }

  /* ---------- Table header ---------- */
  .colheads {
    display: grid;
    grid-template-columns: 34px 1fr 168px 108px 90px 30px;
    gap: 14px;
    padding: 0 14px 8px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: var(--muted-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
  }

  /* ---------- Rows ---------- */
  .row {
    border-bottom: 1px solid var(--hairline);
  }

  .row-main {
    display: grid;
    grid-template-columns: 34px 1fr 168px 108px 90px 30px;
    gap: 14px;
    align-items: center;
    padding: 14px;
    cursor: pointer;
    transition: background .12s;
  }
  .row-main:hover { background: var(--panel); }

  .rank {
    font-family: var(--font-mono);
    color: var(--muted-dim);
    font-size: 13px;
  }

  .artist-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    color: var(--paper);
  }
  .artist-genre {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .flag-badge {
    display: inline-block;
    margin-left: 8px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.04em;
    color: var(--flag);
    border: 1px solid var(--flag);
    padding: 1px 5px;
    border-radius: 2px;
    vertical-align: middle;
    opacity: 0.85;
  }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 2px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .badge.tiktok { color: var(--tiktok); border-color: var(--tiktok); }
  .badge.spotify { color: var(--spotify); border-color: var(--spotify); }
  .badge.instagram { color: var(--instagram); border-color: var(--instagram); }
  .badge.playlist { color: var(--playlist); border-color: var(--playlist); }
  .badge.shazam { color: var(--shazam); border-color: var(--shazam); }
  .badge.soundcloud { color: var(--soundcloud); border-color: var(--soundcloud); }

  .spark { display: block; }
  .spark path.trace {
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .spark path.fill { opacity: 0.12; }

  /* Score gauge */
  .gauge-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .gauge-num {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
  }
  .gauge-num.high { color: var(--signal); }
  .gauge-num.mid { color: var(--tiktok); }
  .gauge-num.low { color: var(--muted); }

  .expand-arrow {
    color: var(--muted-dim);
    font-size: 12px;
    transition: transform .15s;
    text-align: right;
  }
  .row.open .expand-arrow { transform: rotate(90deg); color: var(--paper); }

  /* ---------- Expanded detail ---------- */
  .row-detail {
    display: none;
    padding: 4px 14px 22px 62px;
    background: var(--panel);
  }
  .row.open .row-detail { display: block; }

  .why {
    font-size: 13.5px;
    color: var(--paper);
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--panel-raised);
    border-left: 2px solid var(--signal);
    border-radius: 2px;
  }
  .why b { color: var(--signal); font-weight: 600; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .metric-card {
    background: var(--panel-raised);
    border: 1px solid var(--hairline);
    border-radius: 4px;
    padding: 12px 14px;
  }
  .metric-card .label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .metric-card .value {
    font-family: var(--font-mono);
    font-size: 19px;
    font-weight: 600;
    color: var(--paper);
  }
  .metric-card .delta { font-size: 12px; margin-left: 6px; }
  .metric-card .delta.up { color: var(--spotify); }
  .metric-card svg { margin-top: 8px; width: 100%; height: 32px; }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .maturity {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted-dim);
  }

  .actions { display: flex; gap: 8px; }
  .action-btn {
    font-family: var(--font-mono);
    font-size: 11.5px;
    padding: 7px 13px;
    border-radius: 3px;
    border: 1px solid var(--hairline);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .action-btn:hover { color: var(--paper); border-color: var(--muted); }
  .action-btn.reviewed.active { border-color: var(--tiktok); color: var(--tiktok); background: rgba(79,167,157,0.08); }
  .action-btn.contacted.active { border-color: var(--signal); color: var(--signal); background: rgba(217,164,65,0.08); }
  .action-btn.pass.active { border-color: var(--flag); color: var(--flag); background: rgba(193,85,77,0.08); }

  /* ---------- Show more ---------- */
  .showmore {
    display: block;
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: transparent;
    border: 1px dashed var(--hairline);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .showmore:hover { color: var(--paper); border-color: var(--muted); }

  .hidden-row { display: none; }

  @media (max-width: 720px) {
    .colheads { grid-template-columns: 24px 1fr 60px 30px; }
    .col-hide { display: none; }
    .row-main { grid-template-columns: 24px 1fr 60px 30px; }
    .row-detail { padding-left: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <h1>SIGNAL</h1><span class="dot"></span>
      <div class="sub">Daily breakout detection · artists under 10k monthly listeners</div>
    </div>
    <div class="meta">
      <div class="count"><b id="flagCount">31</b> flagged today</div>
      <div>Tue Jul 11 · updated 6:00 AM ET</div>
    </div>
  </div>

  <div class="filters">
    <div class="chip active" data-filter="all">All triggers</div>
    <div class="chip" data-filter="tiktok">TikTok</div>
    <div class="chip" data-filter="spotify">Spotify</div>
    <div class="chip" data-filter="instagram">Instagram</div>
    <div class="chip" data-filter="playlist">Playlist</div>
    <div class="chip" data-filter="multi">Multi-platform only</div>
  </div>

  <div class="colheads">
    <div>#</div>
    <div>Artist</div>
    <div class="col-hide">Trigger</div>
    <div class="col-hide">7-day trace</div>
    <div>Signal</div>
    <div></div>
  </div>

  <div id="rows"></div>

  <button class="showmore" id="showMoreBtn">Show 25 more</button>

</div>

<!--
  BUILD_DATA_START
  build_dashboard.py replaces the content of the script tag below with
  real (or mock-pipeline) output. Everything between the markers is
  regenerated on each build -- don't hand-edit it.
-->
<script type="application/json" id="pipeline-data">
{"date": null, "artists": null}
</script>
<!-- BUILD_DATA_END -->

<script>
const PLATFORM_LABEL = { tiktok: 'TikTok', spotify: 'Spotify', instagram: 'Instagram', playlist: 'Playlist' };

// ---- fallback sample data, used only if no pipeline data was baked in ----
const FALLBACK_SAMPLE_ARTISTS = [
  {name:"Nadia Cross", genre:"bedroom pop", score:8.7, maturity:34, triggers:["tiktok","spotify"],
   why:"TikTok sound usage jumped <b>41 → 260 videos</b> in 3 days, and Spotify listeners followed 2 days later, <b>+310 in a single day</b>. Cross-platform confirmation, high confidence.",
   metrics:[{label:"TikTok sound uses",value:"260",delta:"+219",spark:[41,48,55,90,140,210,260]},
            {label:"Spotify monthly listeners",value:"1,940",delta:"+310",spark:[1400,1450,1490,1520,1560,1630,1940]},
            {label:"Instagram followers",value:"612",delta:"+38",spark:[560,570,575,580,590,600,612]}],
   spark:[41,48,55,90,140,210,260], flags:[]},

  {name:"Ruiner Kid", genre:"hyperpop / rage", score:7.9, maturity:12, triggers:["tiktok"],
   why:"TikTok-only trigger, but crossed floor by a wide margin: sound usage <b>18 → 190</b> in 4 days. Data maturity is low (12 days) — treat as unvalidated but worth a look.",
   metrics:[{label:"TikTok sound uses",value:"190",delta:"+172",spark:[18,20,35,80,130,160,190]},
            {label:"Spotify monthly listeners",value:"310",delta:"+40",spark:[240,250,255,260,270,290,310]}],
   spark:[18,20,35,80,130,160,190], flags:["new"]},

  {name:"Marigold Static", genre:"indie folk", score:7.2, maturity:61, triggers:["playlist","spotify"],
   why:"Added to 4 tracked playlists this week (curatorial signal), Spotify listeners up <b>+540 over 7 days</b>.",
   metrics:[{label:"Playlist adds (7d)",value:"4",delta:"+4",spark:[0,0,1,1,2,3,4]},
            {label:"Spotify monthly listeners",value:"3,120",delta:"+540",spark:[2580,2620,2700,2780,2850,2990,3120]}],
   spark:[2580,2620,2700,2780,2850,2990,3120], flags:[]},

  {name:"Coral Age", genre:"shoegaze", score:6.8, maturity:45, triggers:["instagram"],
   why:"Instagram-only trigger: <b>+5,000 followers in one day</b> — a suspiciously round jump. Flagged for round-number pattern; worth a quick look before contact.",
   metrics:[{label:"Instagram followers",value:"7,410",delta:"+5,000",spark:[2350,2380,2400,2410,2410,2410,7410]}],
   spark:[2350,2380,2400,2410,2410,2410,7410], flags:["round"]},

  {name:"Deja Faux", genre:"alt R&B", score:6.5, maturity:22, triggers:["tiktok","instagram"],
   why:"TikTok sound usage crossed floor (<b>60 videos</b>), Instagram followers up organically alongside it (<b>+220/day</b>, messy non-round deltas).",
   metrics:[{label:"TikTok sound uses",value:"60",delta:"+52",spark:[8,10,15,22,35,48,60]},
            {label:"Instagram followers",value:"1,830",delta:"+220",spark:[1400,1470,1520,1560,1610,1700,1830]}],
   spark:[8,10,15,22,35,48,60], flags:[]},

  {name:"Low Vellum", genre:"ambient / drone", score:5.9, maturity:70, triggers:["spotify"],
   why:"Spotify-only: steady climb crossing the 7-day floor, <b>+520 listeners this week</b>. No social confirmation yet — worth monitoring another cycle.",
   metrics:[{label:"Spotify monthly listeners",value:"4,880",delta:"+520",spark:[4200,4290,4370,4460,4560,4700,4880]}],
   spark:[4200,4290,4370,4460,4560,4700,4880], flags:[]},

  {name:"Petra Vine", genre:"country pop", score:5.6, maturity:18, triggers:["playlist"],
   why:"Added to 3 tracked playlists in one week — pure curatorial signal, no streaming movement yet.",
   metrics:[{label:"Playlist adds (7d)",value:"3",delta:"+3",spark:[0,0,0,1,1,2,3]}],
   spark:[0,0,0,1,1,2,3], flags:["new"]},

  {name:"Honest Weather", genre:"emo revival", score:5.2, maturity:55, triggers:["tiktok"],
   why:"TikTok sound usage crossed floor narrowly (<b>52 videos</b>). Single platform, moderate confidence.",
   metrics:[{label:"TikTok sound uses",value:"52",delta:"+41",spark:[11,14,20,28,36,44,52]}],
   spark:[11,14,20,28,36,44,52], flags:[]},

  {name:"Sable & Rein", genre:"neo-soul", score:5.0, maturity:40, triggers:["instagram"],
   why:"Instagram followers up <b>+640</b> over 2 days, messy non-round pattern consistent with organic reach.",
   metrics:[{label:"Instagram followers",value:"2,110",delta:"+640",spark:[1300,1340,1360,1400,1470,1600,2110]}],
   spark:[1300,1340,1360,1400,1470,1600,2110], flags:[]},

  {name:"Tin Chapel", genre:"slowcore", score:4.7, maturity:80, triggers:["spotify"],
   why:"Spotify listeners crossed the daily floor once (<b>+160</b>), first movement in 80 days of flat tracking.",
   metrics:[{label:"Spotify monthly listeners",value:"890",delta:"+160",spark:[700,710,715,720,725,730,890]}],
   spark:[700,710,715,720,725,730,890], flags:[]},

  {name:"Verdant Youth", genre:"pop punk", score:4.4, maturity:9, triggers:["tiktok"],
   why:"New candidate, entered registry via trending sound feed 9 days ago. Crossed floor immediately at <b>55 videos</b>.",
   metrics:[{label:"TikTok sound uses",value:"55",delta:"+55",spark:[0,2,5,12,20,35,55]}],
   spark:[0,2,5,12,20,35,55], flags:["new"]},

  {name:"Ochre Signal", genre:"synthwave", score:4.1, maturity:65, triggers:["playlist"],
   why:"Single playlist add this week, first curatorial signal after 65 days of no movement.",
   metrics:[{label:"Playlist adds (7d)",value:"1",delta:"+1",spark:[0,0,0,0,0,0,1]}],
   spark:[0,0,0,0,0,0,1], flags:[]},

  {name:"Muted Parade", genre:"post-punk", score:3.9, maturity:30, triggers:["instagram"],
   why:"Instagram followers up <b>+210</b>, right at the floor line. Watch, not yet a strong signal.",
   metrics:[{label:"Instagram followers",value:"1,040",delta:"+210",spark:[790,800,810,820,830,832,1040]}],
   spark:[790,800,810,820,830,832,1040], flags:[]},

  {name:"Halide Youth", genre:"dream pop", score:3.6, maturity:52, triggers:["spotify"],
   why:"Spotify listeners crossed floor over 7 days (<b>+505</b>), gradual and steady rather than spiky.",
   metrics:[{label:"Spotify monthly listeners",value:"2,240",delta:"+505",spark:[1735,1790,1850,1930,2020,2140,2240]}],
   spark:[1735,1790,1850,1930,2020,2140,2240], flags:[]},

  {name:"Quartz Motel", genre:"country", score:3.3, maturity:15, triggers:["tiktok"],
   why:"New candidate via new-release feed. TikTok crossed floor narrowly at <b>51 videos</b>.",
   metrics:[{label:"TikTok sound uses",value:"51",delta:"+51",spark:[0,3,8,15,25,38,51]}],
   spark:[0,3,8,15,25,38,51], flags:["new"]}
];

// pad fallback to 31 total with lighter variants, just so the "show more"
// behavior is visible even in fallback/preview mode
const extraNames = ["Wren Salt","Amber Loft","Blue Runner Kids","Fenwick","Casual Static","Loom & Larder","Nightjar Choir","Palisade","Thin Copper","Slow Regatta","Marrow Coast","Vellum Youth","Cathode Bloom","Rustbelt Honey","Faint Radio","Green Static"];
extraNames.forEach((n,i)=>{
  const base = 3.1 - i*0.14;
  FALLBACK_SAMPLE_ARTISTS.push({
    name:n, genre:["indie","bedroom pop","alt rock","folk","pop"][i%5], score: Math.max(1.2, base), maturity: 20+i*3,
    triggers:[["tiktok"],["spotify"],["instagram"],["playlist"]][i%4],
    why:"Crossed floor on a single platform. Lower confidence, not yet cross-confirmed.",
    metrics:[{label:"Spotify monthly listeners",value:(500+i*80).toString(),delta:"+"+(150+i*5),spark:[400,410,420,430,440,460,500+i*20]}],
    spark:[10,14,18,22,28,34,40+i*2], flags:[]
  });
});

// ---- decide real pipeline data vs. fallback sample ----
let pipelineDate = null;
let artists;
try {
  const raw = JSON.parse(document.getElementById('pipeline-data').textContent);
  if (raw && raw.artists && raw.artists.length > 0) {
    artists = raw.artists;
    pipelineDate = raw.date;
  } else {
    artists = FALLBACK_SAMPLE_ARTISTS;
  }
} catch (e) {
  artists = FALLBACK_SAMPLE_ARTISTS;
}

artists.sort((a,b)=>b.score-a.score);
document.getElementById('flagCount').textContent = artists.length;
if (pipelineDate) {
  document.querySelector('.meta > div:last-child').textContent = pipelineDate + ' \u00b7 live pipeline run';
} else {
  document.querySelector('.meta > div:last-child').textContent = 'Tue Jul 11 \u00b7 sample/preview data, no pipeline run baked in';
}

function sparkPath(data, w, h){
  const max = Math.max(...data), min = Math.min(...data);
  const range = (max-min)||1;
  const step = w/(data.length-1);
  return data.map((v,i)=>{
    const x = i*step;
    const y = h - ((v-min)/range)*h;
    return (i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
}

function gaugeClass(score){
  if (score >= 10) return "high";
  if (score >= 5) return "mid";
  return "low";
}

function badgeHtml(triggers){
  return triggers.map(t=>`<span class="badge ${t}">${PLATFORM_LABEL[t]}</span>`).join("");
}

function flagBadge(flags){
  if (!flags || !flags.length) return "";
  if (flags.includes("round")) return `<span class="flag-badge">⚠ round-number</span>`;
  if (flags.includes("new")) return `<span class="flag-badge" style="color:var(--tiktok);border-color:var(--tiktok)">new · unvalidated</span>`;
  return "";
}

const rowsEl = document.getElementById('rows');
let html = "";
artists.forEach((a, idx) => {
  const gClass = gaugeClass(a.score);
  const trace = sparkPath(a.spark, 148, 30);
  const traceColor = a.triggers.length > 1 ? "var(--signal)" : "var(--" + a.triggers[0] + ")";
  const hiddenClass = idx >= 25 ? "hidden-row" : "";
  const metricCards = a.metrics.map(m=>{
    const mp = sparkPath(m.spark, 160, 28);
    return `<div class="metric-card">
      <div class="label">${m.label}</div>
      <div class="value">${m.value}<span class="delta up">${m.delta}</span></div>
      <svg viewBox="0 0 160 28"><path d="${mp}" fill="none" stroke="var(--signal)" stroke-width="1.6" stroke-linecap="round"/></svg>
    </div>`;
  }).join("");

  html += `
  <div class="row ${hiddenClass}" data-idx="${idx}" data-triggers="${a.triggers.join(',')}" data-multi="${a.triggers.length>1}">
    <div class="row-main" onclick="this.parentElement.classList.toggle('open')">
      <div class="rank">${(idx+1).toString().padStart(2,'0')}</div>
      <div>
        <div class="artist-name">${a.spotify_url ? `<a href="${a.spotify_url}" target="_blank" style="color:inherit;text-decoration:none;" onclick="event.stopPropagation()">${a.name}</a>` : a.name}${flagBadge(a.flags)}</div>
        <div class="artist-genre">${a.genre}</div>
      </div>
      <div class="badges col-hide">${badgeHtml(a.triggers)}</div>
      <div class="col-hide">
        <svg class="spark" viewBox="0 0 148 30" width="148" height="30">
          <path class="trace" d="${trace}" stroke="${traceColor}"/>
        </svg>
      </div>
      <div class="gauge-wrap"><span class="gauge-num ${gClass}">${a.score.toFixed(1)}</span></div>
      <div class="expand-arrow">▸</div>
    </div>
    <div class="row-detail">
      <div class="why">${a.why}</div>
      <div class="detail-grid">${metricCards}</div>
      <div class="footer-row">
        <div class="maturity">${a.maturity} days tracked · ${a.triggers.length > 1 ? 'multi-platform confirmed' : 'single platform'}</div>
        <div class="actions">
          <button class="action-btn reviewed" onclick="event.stopPropagation(); this.classList.toggle('active')">Mark reviewed</button>
          <button class="action-btn contacted" onclick="event.stopPropagation(); this.classList.toggle('active')">Contacted</button>
          <button class="action-btn pass" onclick="event.stopPropagation(); this.classList.toggle('active')">Pass</button>
        </div>
      </div>
    </div>
  </div>`;
});
rowsEl.innerHTML = html;

// show more
const showMoreBtn = document.getElementById('showMoreBtn');
showMoreBtn.addEventListener('click', () => {
  document.querySelectorAll('.hidden-row').forEach(r => r.classList.remove('hidden-row'));
  showMoreBtn.style.display = 'none';
});
if (artists.length <= 25) showMoreBtn.style.display = 'none';

// filters
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const f = chip.dataset.filter;
    document.querySelectorAll('.row').forEach(row => {
      const triggers = row.dataset.triggers.split(',');
      const isMulti = row.dataset.multi === 'true';
      let show = true;
      if (f === 'multi') show = isMulti;
      else if (f !== 'all') show = triggers.includes(f);
      row.style.display = show ? '' : 'none';
    });
  });
});
</script>

</body>
</html>
